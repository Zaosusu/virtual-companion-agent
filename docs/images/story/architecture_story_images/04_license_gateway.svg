<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">托管授权服务</title>
  <desc id="desc">展示托管授权服务如何隔离 API Key、校验账号授权、记录额度并中转到 StepFun。</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#3976d3"/></marker>
    <style>
      .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:74px;font-weight:900;fill:#092653}
      .label{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:32px;font-weight:850;fill:#102d58}
      .small{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:23px;font-weight:700;fill:#385874}
      .tiny{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:19px;font-weight:700;fill:#54708d}
      .line{fill:none;stroke:#3976d3;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#fbfdff"/>
  <text x="800" y="94" text-anchor="middle" class="title">托管授权服务：守门与中转</text>
  <text x="800" y="138" text-anchor="middle" class="small">普通用户不接触模型 API Key，授权服务负责账号、额度、安全边界和模型中转</text>

  <rect x="74" y="296" width="280" height="220" rx="30" fill="#eaf2ff" stroke="#4c80d9" stroke-width="3"/>
  <text x="214" y="360" text-anchor="middle" class="label">客户端</text>
  <text x="214" y="414" text-anchor="middle" class="small">保存用户登录态</text>
  <text x="214" y="452" text-anchor="middle" class="small">发起 chat/image/tts</text>

  <rect x="520" y="206" width="560" height="400" rx="34" fill="#ffffff" stroke="#4c80d9" stroke-width="4"/>
  <text x="800" y="272" text-anchor="middle" class="label">license-backend</text>
  <text x="800" y="314" text-anchor="middle" class="small">托管授权服务与模型中转网关</text>

  <rect x="576" y="354" width="210" height="90" rx="18" fill="#e9f8f1" stroke="#52a982" stroke-width="3"/>
  <text x="681" y="409" text-anchor="middle" class="small">账号与授权码</text>
  <rect x="814" y="354" width="210" height="90" rx="18" fill="#fff3df" stroke="#f0a54b" stroke-width="3"/>
  <text x="919" y="409" text-anchor="middle" class="small">额度与用量</text>
  <rect x="576" y="470" width="210" height="90" rx="18" fill="#f2edff" stroke="#8a74da" stroke-width="3"/>
  <text x="681" y="525" text-anchor="middle" class="small">请求限流</text>
  <rect x="814" y="470" width="210" height="90" rx="18" fill="#e9fbff" stroke="#56aac7" stroke-width="3"/>
  <text x="919" y="525" text-anchor="middle" class="small">API Key 隔离</text>

  <rect x="1246" y="296" width="280" height="220" rx="30" fill="#e9f8f1" stroke="#52a982" stroke-width="3"/>
  <text x="1386" y="360" text-anchor="middle" class="label">StepFun</text>
  <text x="1386" y="414" text-anchor="middle" class="small">Chat / Image / TTS</text>
  <text x="1386" y="452" text-anchor="middle" class="small">Voice Clone</text>

  <path d="M354 406 C420 406 454 406 520 406" class="line"/>
  <path d="M1080 406 C1146 406 1180 406 1246 406" class="line"/>

  <rect x="196" y="646" width="250" height="88" rx="20" fill="#fff" stroke="#a8c3ed" stroke-width="3"/>
  <text x="321" y="700" text-anchor="middle" class="small">Bearer vc_user_xxx</text>
  <rect x="526" y="646" width="250" height="88" rx="20" fill="#fff" stroke="#a8c3ed" stroke-width="3"/>
  <text x="651" y="700" text-anchor="middle" class="small">校验身份与额度</text>
  <rect x="856" y="646" width="250" height="88" rx="20" fill="#fff" stroke="#a8c3ed" stroke-width="3"/>
  <text x="981" y="700" text-anchor="middle" class="small">记录成功用量</text>
  <rect x="1186" y="646" width="250" height="88" rx="20" fill="#fff" stroke="#a8c3ed" stroke-width="3"/>
  <text x="1311" y="700" text-anchor="middle" class="small">返回模型结果</text>

  <rect x="210" y="790" width="1180" height="72" rx="22" fill="#ffffff" stroke="#9bbceb" stroke-width="3"/>
  <text x="800" y="838" text-anchor="middle" class="label">故事线：授权服务像门禁和前台，确认能用、记好次数，再把请求送到模型服务。</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">一条消息的旅程</title>
  <desc id="desc">展示用户消息从前端进入本地 API，再由 Agent 编排、记忆、安全和模型通道共同完成回复的流程。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3976d3"/>
    </marker>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <style>
      .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:72px;font-weight:800;fill:#092653}
      .subtitle{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:28px;font-weight:700;fill:#31517e}
      .label{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:30px;font-weight:800;fill:#0e2b55}
      .small{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:23px;font-weight:700;fill:#335273}
      .tiny{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:19px;font-weight:700;fill:#526b86}
      .box{fill:#ffffff;stroke:#4c80d9;stroke-width:3}
      .soft-blue{fill:#e9f2ff;stroke:#4c80d9;stroke-width:3}
      .soft-green{fill:#e9f8f1;stroke:#52a982;stroke-width:3}
      .soft-orange{fill:#fff3df;stroke:#f0a54b;stroke-width:3}
      .soft-purple{fill:#f2edff;stroke:#8a74da;stroke-width:3}
      .line{fill:none;stroke:#3976d3;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-blue)}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="88" text-anchor="middle" class="title">一条消息的旅程</text>
  <text x="800" y="132" text-anchor="middle" class="subtitle">从用户的一句话开始，系统把体验、编排、记忆、安全和模型通道分层完成</text>

  <rect x="64" y="228" width="260" height="150" rx="28" class="soft-blue"/>
  <circle cx="132" cy="303" r="39" fill="#6aa2ef" stroke="#245ba8" stroke-width="4"/>
  <circle cx="119" cy="297" r="7" fill="#fff"/><circle cx="144" cy="297" r="7" fill="#fff"/>
  <path d="M114 331 L96 354 L128 338" fill="#6aa2ef" stroke="#245ba8" stroke-width="4" stroke-linejoin="round"/>
  <text x="212" y="294" text-anchor="middle" class="label">用户</text>
  <text x="212" y="334" text-anchor="middle" class="small">说出意图</text>

  <rect x="426" y="210" width="260" height="186" rx="28" class="soft-green"/>
  <rect x="492" y="252" width="128" height="86" rx="12" fill="#ffffff" stroke="#2f8464" stroke-width="4"/>
  <rect x="510" y="270" width="40" height="24" rx="4" fill="#7fc8a5"/>
  <rect x="562" y="270" width="40" height="24" rx="4" fill="#d4ecff"/>
  <rect x="510" y="306" width="92" height="12" rx="6" fill="#cfe2f8"/>
  <text x="556" y="363" text-anchor="middle" class="label">前端 UI</text>
  <text x="556" y="397" text-anchor="middle" class="small">只负责展示与交互</text>

  <rect x="788" y="210" width="260" height="186" rx="28" class="soft-purple"/>
  <rect x="854" y="250" width="128" height="92" rx="15" fill="#ffffff" stroke="#6b5bc8" stroke-width="4"/>
  <path d="M880 285 H956 M880 314 H930" stroke="#9ba8e8" stroke-width="12" stroke-linecap="round"/>
  <text x="918" y="363" text-anchor="middle" class="label">本地 API</text>
  <text x="918" y="397" text-anchor="middle" class="small">承接请求与数据</text>

  <rect x="1150" y="210" width="310" height="186" rx="28" class="soft-orange"/>
  <circle cx="1240" cy="296" r="54" fill="#ffe0ad" stroke="#d2822c" stroke-width="4"/>
  <path d="M1210 296 H1270 M1240 266 V326" stroke="#d2822c" stroke-width="10" stroke-linecap="round"/>
  <text x="1320" y="286" text-anchor="middle" class="label">Orchestrator</text>
  <text x="1320" y="326" text-anchor="middle" class="small">决定该找谁帮忙</text>

  <path d="M324 303 C360 303 390 303 426 303" class="line"/>
  <path d="M686 303 C720 303 754 303 788 303" class="line"/>
  <path d="M1048 303 C1084 303 1114 303 1150 303" class="line"/>

  <rect x="118" y="548" width="310" height="118" rx="24" class="box"/>
  <text x="273" y="595" text-anchor="middle" class="label">本地 SQLite</text>
  <text x="273" y="633" text-anchor="middle" class="small">消息、角色、长期记忆</text>

  <rect x="496" y="548" width="310" height="118" rx="24" class="box"/>
  <text x="651" y="595" text-anchor="middle" class="label">Safety Agent</text>
  <text x="651" y="633" text-anchor="middle" class="small">先识别风险，再约束输出</text>

  <rect x="874" y="548" width="310" height="118" rx="24" class="box"/>
  <text x="1029" y="595" text-anchor="middle" class="label">模型通道</text>
  <text x="1029" y="633" text-anchor="middle" class="small">托管授权或自部署 API</text>

  <rect x="1252" y="548" width="260" height="118" rx="24" class="box"/>
  <text x="1382" y="595" text-anchor="middle" class="label">多模态输出</text>
  <text x="1382" y="633" text-anchor="middle" class="small">文字、图片、语音</text>

  <path d="M1305 396 C1305 454 273 474 273 548" class="line"/>
  <path d="M1320 396 C1320 462 651 474 651 548" class="line"/>
  <path d="M1335 396 C1335 462 1029 474 1029 548" class="line"/>
  <path d="M1460 396 C1490 470 1450 505 1382 548" class="line"/>

  <rect x="245" y="760" width="1110" height="92" rx="24" fill="#ffffff" stroke="#9bbceb" stroke-width="3"/>
  <text x="800" y="818" text-anchor="middle" class="label">故事线：前端把话递进来，本地后端理解这句话，再把合适的结果送回界面。</text>
</svg>

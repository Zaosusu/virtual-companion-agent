<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">RouterAgent 总调度员</title>
  <desc id="desc">展示 RouterAgent 先判断任务类型，再把请求交给文本、图片、语音、记忆或安全 Agent。</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3976d3"/>
    </marker>
    <style>
      .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:76px;font-weight:900;fill:#092653}
      .label{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:33px;font-weight:850;fill:#102d58}
      .small{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:24px;font-weight:700;fill:#375879}
      .box{stroke-width:3;rx:22}
      .blue{fill:#eaf2ff;stroke:#4c80d9}
      .green{fill:#e9f8f1;stroke:#52a982}
      .purple{fill:#f2edff;stroke:#8a74da}
      .orange{fill:#fff3df;stroke:#f0a54b}
      .cyan{fill:#e9fbff;stroke:#56aac7}
      .line{fill:none;stroke:#3976d3;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .line-green{fill:none;stroke:#34a978;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#fbfdff"/>
  <text x="800" y="96" text-anchor="middle" class="title">RouterAgent：总调度员</text>

  <rect x="450" y="132" width="330" height="74" rx="18" fill="#ffffff" stroke="#4c80d9" stroke-width="3"/>
  <text x="615" y="180" text-anchor="middle" class="label">先判断这是哪类事</text>
  <path d="M800 169 H872" class="line"/>
  <rect x="902" y="132" width="330" height="74" rx="18" fill="#f3fbf8" stroke="#89bfae" stroke-width="3"/>
  <text x="1067" y="180" text-anchor="middle" class="label">再交给对应 Agent</text>

  <rect x="48" y="190" width="330" height="104" rx="22" class="box blue"/>
  <text x="214" y="255" text-anchor="middle" class="label">用户对话</text>
  <rect x="48" y="322" width="330" height="104" rx="22" class="box green"/>
  <text x="214" y="387" text-anchor="middle" class="label">想生成图片</text>
  <rect x="48" y="454" width="330" height="104" rx="22" class="box purple"/>
  <text x="214" y="519" text-anchor="middle" class="label">想听角色说话</text>
  <rect x="48" y="586" width="330" height="104" rx="22" class="box orange"/>
  <text x="214" y="651" text-anchor="middle" class="label">出现安全信号</text>

  <circle cx="800" cy="450" r="184" fill="#dcecff"/>
  <rect x="590" y="344" width="420" height="220" rx="32" fill="#ffffff" stroke="#4c80d9" stroke-width="5"/>
  <rect x="640" y="396" width="320" height="94" rx="18" fill="#526c91"/>
  <text x="800" y="456" text-anchor="middle" style="font-family:'Microsoft YaHei','Noto Sans CJK SC',Arial,sans-serif;font-size:52px;font-weight:900;fill:#ffffff">RouterAgent</text>
  <text x="800" y="530" text-anchor="middle" class="label">只做分流，不抢业务</text>

  <rect x="1218" y="190" width="330" height="104" rx="22" class="box blue"/>
  <text x="1384" y="255" text-anchor="middle" class="label">交给 textAgent</text>
  <rect x="1218" y="322" width="330" height="104" rx="22" class="box green"/>
  <text x="1384" y="387" text-anchor="middle" class="label">交给 imageAgent</text>
  <rect x="1218" y="454" width="330" height="104" rx="22" class="box purple"/>
  <text x="1384" y="519" text-anchor="middle" class="label">交给 voiceAgent</text>
  <rect x="1218" y="586" width="330" height="104" rx="22" class="box orange"/>
  <text x="1384" y="651" text-anchor="middle" class="label">交给 safetyAgent</text>

  <path d="M378 242 C455 242 500 356 590 408" class="line"/>
  <path d="M378 374 C462 374 502 416 590 438" class="line"/>
  <path d="M378 506 C462 506 502 478 590 462" class="line"/>
  <path d="M378 638 C455 638 508 548 590 494" class="line"/>
  <path d="M1010 408 C1096 356 1138 242 1218 242" class="line"/>
  <path d="M1010 438 C1096 416 1138 374 1218 374" class="line-green"/>
  <path d="M1010 462 C1096 478 1138 506 1218 506" class="line"/>
  <path d="M1010 494 C1096 548 1138 638 1218 638" class="line"/>

  <rect x="240" y="760" width="1120" height="92" rx="24" fill="#ffffff" stroke="#9bbceb" stroke-width="3"/>
  <text x="800" y="818" text-anchor="middle" class="label">一句话：先分流，再处理，避免所有逻辑混在前端或单个函数里。</text>
</svg>
